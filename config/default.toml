[server]
host = "0.0.0.0"
port = 3000

[database]
url = "sqlite://inkforge.db?mode=rwc"

[auth]
secret = "inkforge-change-me-in-production"
expires_in_seconds = 604800

[storage]
upload_dir = "uploads"
max_upload_size_mb = 10

[theme]
theme_dir = "themes"
active_theme_fallback = "default"
default_mode = "system"

[paths]
admin_dist_dir = "src/admin/dist"
