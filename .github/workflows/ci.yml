name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'migrations/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/admin/ui/**'
      - '.github/workflows/**'
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'migrations/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/admin/ui/**'
      - '.github/workflows/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite://inkforge_ci.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build

  frontend:
    name: Frontend check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'src/admin/ui/package-lock.json'

      - name: Install deps
        working-directory: src/admin/ui
        run: npm ci

      - name: Type check
        working-directory: src/admin/ui
        run: npx tsc --noEmit

      - name: Build
        working-directory: src/admin/ui
        run: npm run build
