name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'migrations/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/admin/ui/**'
      - '.github/workflows/**'
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'migrations/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/admin/ui/**'
      - '.github/workflows/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.os }} checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    env:
      DATABASE_URL: sqlite://inkforge_ci.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'src/admin/ui/package-lock.json'

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Backend format check
        run: cargo fmt --all -- --check

      - name: Backend lint check
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Backend tests
        run: cargo test --all --all-features

      - name: Backend build
        run: cargo build --release

      - name: Backend vulnerability audit
        run: cargo audit

      - name: Install frontend deps
        working-directory: src/admin/ui
        run: npm ci

      - name: Frontend build
        working-directory: src/admin/ui
        run: npm run build

      - name: Frontend vulnerability audit
        working-directory: src/admin/ui
        run: npm audit --audit-level=high

      - name: Upload backend artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.os }}
          path: target/release/inkforge*
          retention-days: 7

      - name: Upload admin dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist-${{ matrix.os }}
          path: src/admin/dist
          retention-days: 7
