<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - {{ site_title }}</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
:root{--text:#1f2937;--muted:#64748b;--border:#dbe3ef;--card:#ffffff;--bg:#f8fafc;--accent:#ea580c;--accent-deep:#c2410c;--danger:#dc2626;--soft:#fff7ed}
body{margin:0;background:linear-gradient(180deg,#fef3e8 0,#f8fafc 24%,#f8fafc 100%);font-family:'Manrope',sans-serif;color:var(--text)}
.wrap{max-width:920px;margin:0 auto;padding:28px 20px 60px}
.nav,.panel-head,.row{display:flex;align-items:center;justify-content:space-between;gap:14px}
.nav{margin-bottom:24px}
.nav-links{display:flex;gap:12px;flex-wrap:wrap}
a{text-decoration:none}
.link,.ghost,.danger,.primary{display:inline-flex;align-items:center;justify-content:center;padding:11px 16px;border-radius:14px;font-weight:700;font-size:14px;border:1px solid var(--border);transition:all .2s ease}
.link,.ghost{background:#fff;color:var(--text)}
.link:hover,.ghost:hover{border-color:#94a3b8}
.primary{border:0;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;box-shadow:0 14px 30px rgba(234,88,12,.24)}
.primary:hover{transform:translateY(-1px)}
.danger{background:#fff1f2;color:var(--danger);border-color:#fecaca}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}
.panel{grid-column:span 12;background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.75);border-radius:28px;padding:28px;box-shadow:0 20px 60px rgba(15,23,42,.08)}
.hero{display:flex;align-items:center;gap:18px;margin-bottom:10px}
.avatar{width:78px;height:78px;border-radius:24px;background:linear-gradient(135deg,#fb923c,#ea580c);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;box-shadow:0 16px 32px rgba(234,88,12,.22)}
.meta h1{margin:0 0 6px;font-size:30px;line-height:1.05}
.meta p{margin:0;color:var(--muted)}
.section-title{margin:0;font-size:20px}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:20px}
.field{display:flex;flex-direction:column;gap:8px}
.field.full{grid-column:1 / -1}
label{font-size:13px;font-weight:700;color:#475569}
input,textarea,select{width:100%;padding:14px 16px;border-radius:16px;border:1px solid var(--border);background:#fff;font:inherit;color:var(--text);transition:border-color .2s,box-shadow .2s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(234,88,12,.12)}
textarea{min-height:120px;resize:vertical}
.actions{display:flex;justify-content:flex-end;gap:12px;margin-top:18px;flex-wrap:wrap}
.alert{display:none;margin-top:16px;padding:12px 14px;border-radius:14px;font-size:13px;font-weight:700}
.alert.success{display:block;background:#ecfdf5;color:#047857;border:1px solid #a7f3d0}
.alert.error{display:block;background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
.comment-list{display:flex;flex-direction:column;gap:14px;margin-top:20px}
.comment-item{padding:18px 18px 16px;border:1px solid var(--border);border-radius:20px;background:#fff}
.comment-meta{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.comment-meta a{color:var(--accent);font-weight:800}
.comment-status{font-size:12px;font-weight:800;padding:5px 10px;border-radius:999px;background:var(--soft);color:var(--accent-deep)}
.empty{margin-top:18px;padding:24px;border-radius:20px;background:#fff;border:1px dashed var(--border);color:var(--muted);text-align:center}
@media(max-width:760px){.form-grid{grid-template-columns:1fr}.panel{padding:22px}.hero{align-items:flex-start;flex-direction:column}.nav,.panel-head,.comment-meta{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="/" class="link" data-i18n="backHome">Back home</a>
    <div class="nav-links">
      <!-- 语言切换 -->
      <div class="lang-switch" style="display:flex;gap:4px;background:#fff;padding:4px;border-radius:10px;border:1px solid var(--border);">
        <button type="button" data-lang="zh" class="lang-btn" style="padding:6px 12px;border:none;border-radius:6px;background:transparent;cursor:pointer;font-size:12px;font-weight:600;">中</button>
        <button type="button" data-lang="en" class="lang-btn" style="padding:6px 12px;border:none;border-radius:6px;background:transparent;cursor:pointer;font-size:12px;font-weight:600;">En</button>
      </div>
      <a href="{{ admin_url or '/admin' }}" class="ghost">Admin</a>
      <button id="logoutBtn" class="danger" type="button" data-i18n="signOut">Sign out</button>
    </div>
  </nav>

  <section class="panel">
    <div class="hero">
      <div class="avatar">{{ current_user.display_name[:1] | upper }}</div>
      <div class="meta">
        <h1>{{ current_user.display_name }}</h1>
        <p>@{{ current_user.username }} · <span data-i18n="role">{{ current_user.role }}</span> · <span data-i18n="joined">joined</span> {{ current_user.created_at[:10] }}</p>
      </div>
    </div>
  </section>

  <div class="grid">
    <section class="panel">
      <div class="panel-head">
        <h2 class="section-title" data-i18n="profileSettings">Profile settings</h2>
      </div>
      <div id="profileAlert" class="alert"></div>
      <form id="profileForm">
        <div class="form-grid">
          <div class="field">
            <label for="displayName" data-i18n="displayName">Display name</label>
            <input id="displayName" name="display_name" type="text" value="{{ current_user.display_name }}" required>
          </div>
          <div class="field">
            <label for="language">Language</label>
            <select id="language" name="language">
              <option value="zh" {% if current_user.language == "zh" %}selected{% endif %}>简体中文</option>
              <option value="en" {% if current_user.language == "en" %}selected{% endif %}>English</option>
            </select>
          </div>
          <div class="field">
            <label for="themePreference" data-i18n="themePreference">Theme preference</label>
            <select id="themePreference" name="theme_preference">
              <option value="system" {% if current_user.theme_preference == "system" %}selected{% endif %} data-i18n="system">System</option>
              <option value="light" {% if current_user.theme_preference == "light" %}selected{% endif %} data-i18n="light">Light</option>
              <option value="dark" {% if current_user.theme_preference == "dark" %}selected{% endif %} data-i18n="dark">Dark</option>
            </select>
          </div>
          <div class="field full">
            <label for="bio" data-i18n="bio">Bio</label>
            <textarea id="bio" name="bio" placeholder="Write a short bio" data-i18n-placeholder="bioPlaceholder">{{ current_user.bio or "" }}</textarea>
          </div>
        </div>
        <div class="actions">
          <button class="primary" id="saveProfileBtn" type="submit" data-i18n="saveProfile">Save profile</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2 class="section-title" data-i18n="changePassword">Change password</h2>
      </div>
      <div id="passwordAlert" class="alert"></div>
      <form id="passwordForm">
        <div class="form-grid">
          <div class="field full">
            <label for="currentPassword" data-i18n="currentPassword">Current password</label>
            <input id="currentPassword" name="current_password" type="password" autocomplete="current-password" required>
          </div>
          <div class="field">
            <label for="newPassword" data-i18n="newPassword">New password</label>
            <input id="newPassword" name="new_password" type="password" autocomplete="new-password" required>
          </div>
          <div class="field">
            <label for="confirmPassword" data-i18n="confirmPassword">Confirm new password</label>
            <input id="confirmPassword" type="password" autocomplete="new-password" required>
          </div>
        </div>
        <div class="actions">
          <button class="primary" id="changePasswordBtn" type="submit" data-i18n="updatePassword">Update password</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2 class="section-title" data-i18n="myComments">My comments</h2>
      </div>
      <div id="commentsEmpty" class="empty" style="display:none" data-i18n="noComments">No comments yet.</div>
      <div id="commentsList" class="comment-list"></div>
    </section>
  </div>
</div>
<script src="{{ theme_assets_url('js/site-api.js') }}"></script>
<script src="{{ theme_assets_url('js/i18n.js') }}"></script>
<script>
const profileData = {{ current_user | tojson | safe }};
const currentLang = profileData.language || 'zh';
const commentsList = document.getElementById('commentsList');
const commentsEmpty = document.getElementById('commentsEmpty');

function showAlert(id, message, type) {
  const el = document.getElementById(id);
  el.textContent = message;
  el.className = `alert ${type}`;
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function loadComments() {
  const data = await window.InkForgeApi.apiRequest('/api/me/comments?page=1&page_size=20');
  const items = data.items || [];

  if (items.length === 0) {
    commentsEmpty.style.display = 'block';
    commentsList.innerHTML = '';
    return;
  }

  commentsEmpty.style.display = 'none';
  commentsList.innerHTML = items.map((comment) => `
    <article class="comment-item">
      <div class="comment-meta">
        <a href="/${comment.post_content_type === 'page' ? 'pages' : 'posts'}/${escapeHtml(comment.post_slug)}">${escapeHtml(comment.post_title)}</a>
        <span class="comment-status">${escapeHtml(comment.status)}</span>
      </div>
      <div class="comment-meta">
        <span>${escapeHtml((comment.created_at || '').replace('T', ' ').slice(0, 16))}</span>
      </div>
      <p>${escapeHtml(comment.content)}</p>
    </article>
  `).join('');
}

document.getElementById('profileForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const button = document.getElementById('saveProfileBtn');
  button.disabled = true;

  try {
    await window.InkForgeApi.apiRequest('/api/me/profile', {
      method: 'PATCH',
      body: {
        display_name: document.getElementById('displayName').value.trim(),
        bio: document.getElementById('bio').value.trim() || null,
        theme_preference: document.getElementById('themePreference').value,
      },
    });
    showAlert('profileAlert', 'Profile updated.', 'success');
  } catch (error) {
    showAlert('profileAlert', error.message || 'Unable to update profile.', 'error');
  } finally {
    button.disabled = false;
  }
});

document.getElementById('passwordForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const button = document.getElementById('changePasswordBtn');
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (newPassword !== confirmPassword) {
    showAlert('passwordAlert', 'Password confirmation does not match.', 'error');
    return;
  }

  button.disabled = true;
  try {
    await window.InkForgeApi.apiRequest('/api/me/password', {
      method: 'PATCH',
      body: {
        current_password: document.getElementById('currentPassword').value,
        new_password: newPassword,
      },
    });
    event.target.reset();
    showAlert('passwordAlert', 'Password updated.', 'success');
  } catch (error) {
    showAlert('passwordAlert', error.message || 'Unable to update password.', 'error');
  } finally {
    button.disabled = false;
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  try {
    await window.InkForgeApi.logout();
  } finally {
    window.location.href = '/login';
  }
});

loadComments().catch(() => {
  commentsEmpty.style.display = 'block';
  commentsEmpty.textContent = window.I18n ? window.I18n.t('loadCommentsError') : 'Unable to load comments right now.';
});

// 初始化国际化
document.addEventListener('DOMContentLoaded', () => {
  if (window.I18n) {
    window.I18n.init(currentLang);
    window.I18n.updatePage();
  }

  // 语言切换按钮事件
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const newLang = btn.dataset.lang;
      if (newLang === currentLang) return;

      // 更新后端语言设置
      try {
        await window.InkForgeApi.apiRequest('/api/me/profile', {
          method: 'PATCH',
          body: {
            display_name: document.getElementById('displayName').value,
            language: newLang,
          },
        });
        window.location.reload();
      } catch (error) {
        console.error('Failed to update language:', error);
      }
    });
  });
});
</script>
</body>
</html>
