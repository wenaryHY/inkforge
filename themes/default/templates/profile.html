<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 - {{ site_title }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --accent:#ff6b35;--accent-dark:#e55a28;--accent-light:#fff0eb;
  --text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;
  --bg:#f9fafb;--card:#ffffff;--success:#059669;--danger:#dc2626;
  color-scheme:light}
body{margin:0;font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:inherit;text-decoration:none}
.wrap{max-width:760px;margin:0 auto;padding:0 32px}

/* Nav */
.site-nav{padding:28px 0;display:flex;align-items:center;justify-content:space-between}
.nav-back{
  display:inline-flex;align-items:center;gap:6px;
  font-size:14px;font-weight:500;color:var(--muted);
  padding:8px 14px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);
  transition:all 0.2s ease}
.nav-back:hover{color:var(--text);border-color:var(--text)}
.nav-profile{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:500;color:#fff;
  padding:8px 14px;border-radius:10px;
  background:var(--accent);transition:all 0.2s ease}
.nav-profile:hover{background:var(--accent-dark)}

/* Cards */
.profile-card{
  background:var(--card);border-radius:24px;
  border:1px solid var(--border);padding:40px 48px;margin-bottom:24px;
  box-shadow:0 4px 20px rgba(0,0,0,0.04)}
.section-title{
  font-family:'Noto Serif SC',serif;
  font-size:20px;font-weight:700;margin:0 0 24px;
  padding-bottom:16px;border-bottom:1px solid var(--border)}

/* Avatar */
.avatar-section{display:flex;align-items:center;gap:20px;margin-bottom:32px}
.avatar-circle{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#ff8a5c);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:28px;flex-shrink:0;
  font-family:'Noto Serif SC',serif}
.user-info{display:flex;flex-direction:column;gap:4px}
.user-name{font-size:20px;font-weight:700;font-family:'Noto Serif SC',serif}
.user-meta{font-size:13px;color:var(--muted)}

/* Forms */
.form-group{margin-bottom:18px}
.form-label{font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px}
.form-input,.form-textarea,.form-select{
  width:100%;padding:10px 14px;border-radius:10px;
  border:1px solid var(--border);font-size:14px;
  font-family:inherit;background:var(--card);color:var(--text);
  transition:border-color 0.2s;outline:none;box-sizing:border-box}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:90px;line-height:1.6}
.form-hint{font-size:12px;color:var(--muted);margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s ease;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.btn-sm{padding:7px 14px;font-size:13px}

/* Alerts */
.alert{padding:14px 18px;border-radius:12px;margin-bottom:16px;font-size:14px;display:none}
.alert-success{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.alert-error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}

/* Comments */
.comment-list{display:flex;flex-direction:column;gap:0}
.comment-item{
  padding:18px 0;border-bottom:1px solid var(--border)}
.comment-item:last-child{border-bottom:none}
.comment-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.comment-post{font-size:12px;color:var(--accent);font-weight:500}
.comment-time{font-size:12px;color:var(--muted)}
.comment-body{font-size:14.5px;color:var(--text);line-height:1.7;margin:0}
.comment-empty{
  text-align:center;padding:40px 0;
  color:var(--muted);font-size:14px;
  background:var(--bg);border-radius:12px}
.loading{text-align:center;padding:32px 0;color:var(--muted);font-size:14px}

/* Footer */
.site-footer{
  padding:40px 0;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.footer-copy{font-size:13px;color:var(--muted)}
.footer-link{color:var(--accent);font-weight:500}

@media(max-width:640px){
  .wrap{padding:0 20px}
  .profile-card{padding:24px 20px;border-radius:18px}
  .form-row{grid-template-columns:1fr}
  .site-footer{flex-direction:column;gap:10px;align-items:flex-start}
}
</style>
</head>
<body>
<div class="wrap">
  <!-- Nav -->
  <nav class="site-nav">
    <a href="/" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      返回首页
    </a>
    <a href="/admin" class="nav-profile">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      管理后台
    </a>
  </nav>

  <!-- Profile Info -->
  <div class="profile-card">
    <div class="avatar-section">
      <div class="avatar-circle" id="avatarInitial">?</div>
      <div class="user-info">
        <div class="user-name" id="displayName">加载中...</div>
        <div class="user-meta">
          <span id="username"></span>
          <span> · </span>
          <span id="role"></span>
          <span> · </span>
          <span>注册于 <span id="createdAt"></span></span>
        </div>
      </div>
    </div>
    <div id="profileAlert" class="alert"></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">显示名称</label>
        <input class="form-input" id="editDisplayName" placeholder="你的显示名称">
      </div>
      <div class="form-group">
        <label class="form-label">主题偏好</label>
        <select class="form-select" id="editThemePref">
          <option value="system">跟随系统</option>
          <option value="light">浅色模式</option>
          <option value="dark">深色模式</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">个人简介</label>
      <textarea class="form-textarea" id="editBio" placeholder="介绍一下自己吧..."></textarea>
    </div>
    <button class="btn btn-primary" id="saveProfileBtn" onclick="saveProfile()">保存资料</button>
  </div>

  <!-- Change Password -->
  <div class="profile-card">
    <h2 class="section-title">修改密码</h2>
    <div id="passwordAlert" class="alert"></div>
    <div class="form-group">
      <label class="form-label">当前密码</label>
      <input class="form-input" type="password" id="currentPassword" placeholder="输入当前密码">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">新密码</label>
        <input class="form-input" type="password" id="newPassword" placeholder="至少 6 个字符">
      </div>
      <div class="form-group">
        <label class="form-label">确认新密码</label>
        <input class="form-input" type="password" id="confirmPassword" placeholder="再次输入新密码">
      </div>
    </div>
    <button class="btn btn-danger" id="changePwdBtn" onclick="changePassword()">修改密码</button>
  </div>

  <!-- My Comments -->
  <div class="profile-card">
    <h2 class="section-title">我的评论</h2>
    <div id="commentsLoading" class="loading">加载中...</div>
    <div id="commentsEmpty" class="comment-empty" style="display:none">暂无评论记录</div>
    <div class="comment-list" id="commentsList"></div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <span class="footer-copy">© {{ site_title }}</span>
    <span class="footer-link"><a href="/admin">InkForge</a></span>
  </footer>
</div>

<script>
const token = localStorage.getItem('inkforge_token');
function getUser() { return token ? JSON.parse(atob(token.split('.')[1])) : null; }
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert alert-' + type;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}
async function apiFetch(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...opts.headers }
  });
  const json = await r.json();
  if (r.ok && json.code === 0) return json.data;
  throw new Error(json.message || '请求失败');
}
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

(async () => {
  if (!token) {
    location.href = '/admin';
    return;
  }
  try {
    const user = await apiFetch('/api/me');
    document.getElementById('avatarInitial').textContent = (user.display_name || user.username || '?')[0].toUpperCase();
    document.getElementById('displayName').textContent = user.display_name || user.username;
    document.getElementById('username').textContent = '@' + user.username;
    document.getElementById('role').textContent = user.role === 'admin' ? '管理员' : user.role === 'editor' ? '编辑' : '用户';
    document.getElementById('createdAt').textContent = user.created_at ? user.created_at.split('T')[0] : '';
    document.getElementById('editDisplayName').value = user.display_name || '';
    document.getElementById('editBio').value = user.bio || '';
    document.getElementById('editThemePref').value = user.theme_preference || 'system';
  } catch {
    location.href = '/admin';
    return;
  }

  // Load comments
  try {
    const params = new URLSearchParams({ page: '1', page_size: '20' });
    const r = await fetch('/api/me/comments?' + params, { headers: { 'Authorization': 'Bearer ' + token } });
    const json = await r.json();
    const items = json.data?.items || [];
    document.getElementById('commentsLoading').style.display = 'none';
    if (items.length === 0) {
      document.getElementById('commentsEmpty').style.display = 'block';
      return;
    }
    document.getElementById('commentsList').innerHTML = items.map(c => '
      <div class="comment-item">
        <div class="comment-header">
          <a class="comment-post" href="/posts/' + esc(c.post_slug) + '">' + esc(c.post_title) + '</a>
          <span class="comment-time">' + esc(c.created_at ? c.created_at.replace('T', ' ').substring(0, 16) : '') + '</span>
        </div>
        <p class="comment-body">' + esc(c.content) + '</p>
      </div>
    ').join('');
  } catch {
    document.getElementById('commentsLoading').textContent = '加载评论失败';
  }
})();

async function saveProfile() {
  const btn = document.getElementById('saveProfileBtn');
  btn.disabled = true;
  try {
    await apiFetch('/api/me/profile', {
      method: 'PATCH',
      body: JSON.stringify({
        display_name: document.getElementById('editDisplayName').value,
        bio: document.getElementById('editBio').value,
        theme_preference: document.getElementById('editThemePref').value,
      })
    });
    showAlert('profileAlert', '资料保存成功', 'success');
  } catch (e) {
    showAlert('profileAlert', e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

async function changePassword() {
  const np = document.getElementById('newPassword').value;
  const cp = document.getElementById('confirmPassword').value;
  if (np !== cp) { showAlert('passwordAlert', '两次输入的密码不一致', 'error'); return; }
  if (np.length < 6) { showAlert('passwordAlert', '新密码长度不能少于 6 位', 'error'); return; }
  const btn = document.getElementById('changePwdBtn');
  btn.disabled = true;
  try {
    await apiFetch('/api/me/password', {
      method: 'PATCH',
      body: JSON.stringify({
        current_password: document.getElementById('currentPassword').value,
        new_password: np,
      })
    });
    showAlert('passwordAlert', '密码修改成功', 'success');
    document.getElementById('currentPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
  } catch (e) {
    showAlert('passwordAlert', e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
