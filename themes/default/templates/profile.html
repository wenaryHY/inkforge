<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - {{ site_title }}</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="{{ theme_assets_url('css/design-system.css') }}" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;background:var(--surface);font-family:var(--font-body);color:var(--on-surface)}
.wrap{max-width:920px;margin:0 auto;padding:28px 20px 60px}

/* 4.1 玻璃态导航栏 */
.nav{
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:16px 24px;
  margin-bottom:32px;
  background:rgba(255,248,246,0.75);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md);
}
.nav-links{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
a{text-decoration:none}

/* 语言切换器 */
.lang-switch{
  display:flex;
  gap:4px;
  background:var(--surface-container-low);
  padding:4px;
  border-radius:12px;
}
.lang-btn{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:transparent;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  color:var(--on-surface-variant);
  transition:all var(--transition-base);
  font-family:var(--font-display);
}
.lang-btn.active{
  background:var(--primary);
  color:#ffffff;
  box-shadow:0 4px 12px rgba(255,109,0,0.24);
}
.lang-btn:hover:not(.active){
  background:var(--surface-container);
}

/* 4.2 用户英雄区 */
.hero-section{
  margin-bottom:24px;
  background:var(--surface-container-low);
  border-radius:var(--radius-xl);
  padding:var(--space-2xl);
  box-shadow:var(--shadow-md);
}
.hero{display:flex;align-items:center;gap:24px}
.avatar{
  width:88px;
  height:88px;
  border-radius:28px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  font-weight:800;
  font-family:var(--font-display);
  box-shadow:0 16px 32px rgba(255,109,0,0.28);
  flex-shrink:0;
}
.meta h1{
  margin:0 0 8px;
  font-family:var(--font-display);
  font-size:32px;
  font-weight:700;
  line-height:1.1;
  color:var(--on-surface);
}
.meta p{
  margin:0;
  color:var(--on-surface-variant);
  font-size:15px;
}

/* 4.4 基于卡片的区块容器 */
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:24px}
.panel{
  grid-column:span 12;
  background:var(--surface-container-low);
  border-radius:var(--radius-lg);
  padding:var(--space-xl);
  box-shadow:var(--shadow-md);
}
.panel-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:var(--space-lg);
}
.section-title{
  margin:0;
  font-family:var(--font-display);
  font-size:22px;
  font-weight:600;
  color:var(--on-surface);
}

/* 统计卡片 */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-bottom:24px;
}
.stat-card{
  background:var(--surface-container);
  border-radius:var(--radius-lg);
  padding:24px;
  text-align:center;
  box-shadow:var(--shadow-sm);
}
.stat-value{
  display:block;
  font-family:var(--font-display);
  font-size:32px;
  font-weight:700;
  color:var(--primary);
  margin-bottom:8px;
}
.stat-label{
  display:block;
  font-size:13px;
  font-weight:600;
  color:var(--on-surface-variant);
  text-transform:uppercase;
  letter-spacing:0.05em;
}

.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:20px}
.field{display:flex;flex-direction:column;gap:8px}
.field.full{grid-column:1 / -1}
.actions{display:flex;justify-content:flex-end;gap:12px;margin-top:24px;flex-wrap:wrap}
.comment-list{display:flex;flex-direction:column;gap:16px;margin-top:20px}
.comment-item{
  padding:20px;
  border-radius:var(--radius-lg);
  background:var(--surface-container);
  box-shadow:var(--shadow-sm);
}
.comment-meta{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.comment-meta a{color:var(--primary);font-weight:700;font-family:var(--font-display)}
.comment-status{
  font-size:11px;
  font-weight:700;
  padding:6px 12px;
  border-radius:999px;
  background:var(--surface-container-high);
  color:var(--primary-dark);
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.empty{
  margin-top:18px;
  padding:32px;
  border-radius:var(--radius-lg);
  background:var(--surface-container);
  color:var(--on-surface-muted);
  text-align:center;
}

/* Mobile Breakpoint (< 768px) */
@media(max-width:767px){
  .wrap{padding:22px 16px 40px}
  .form-grid{grid-template-columns:1fr}
  .panel{padding:22px}
  .hero{align-items:flex-start;flex-direction:column}
  .hero-section{padding:22px}
  .avatar{width:72px;height:72px;font-size:28px;border-radius:22px}
  .meta h1{font-size:26px}
  .meta p{font-size:14px}
  .nav{flex-direction:column;align-items:stretch;padding:14px 18px}
  .nav-links{flex-direction:column}
  .stats-grid{grid-template-columns:1fr}
  .stat-card{padding:20px}
  .stat-value{font-size:28px}
  .panel-head{align-items:flex-start;flex-direction:column}
  .comment-meta{align-items:flex-start;flex-direction:column}
  .actions{justify-content:stretch;flex-direction:column}
  .actions .btn{width:100%}
  .section-title{font-size:20px}
}

/* Tablet Breakpoint (768px - 1024px) */
@media(min-width:768px) and (max-width:1024px){
  .wrap{max-width:920px;padding:24px 20px 60px}
  .form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .panel{padding:var(--space-xl)}
  .hero-section{padding:var(--space-xl)}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .nav{padding:16px 24px}
}

/* Desktop Breakpoint (> 1024px) */
@media(min-width:1025px){
  .wrap{max-width:920px;margin:0 auto;padding:28px 20px 60px}
  .form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .panel{padding:var(--space-xl)}
  .hero-section{padding:var(--space-2xl)}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:24px}
}
</style>
</head>
<body>
<div class="wrap">
  <!-- 4.1 玻璃态导航栏 -->
  <nav class="nav">
    <a href="/" class="btn btn-secondary" data-i18n="backHome">Back home</a>
    <div class="nav-links">
      <!-- 语言切换器 -->
      <div class="lang-switch">
        <button type="button" data-lang="zh" class="lang-btn">中</button>
        <button type="button" data-lang="en" class="lang-btn">En</button>
      </div>
      <a href="{{ admin_url or '/admin' }}" class="btn btn-ghost" data-i18n="admin">Admin</a>
      <button id="logoutBtn" class="btn btn-ghost" type="button" data-i18n="signOut" style="color:var(--error)">Sign out</button>
    </div>
  </nav>

  <!-- 4.2 用户英雄区 -->
  <section class="hero-section">
    <div class="hero">
      <div class="avatar">{{ current_user.display_name[:1] | upper }}</div>
      <div class="meta">
        <h1>{{ current_user.display_name }}</h1>
        <p>@{{ current_user.username }} · <span data-i18n="role">{{ current_user.role }}</span> · <span data-i18n="joined">joined</span> {{ current_user.created_at[:10] }}</p>
      </div>
    </div>
  </section>

  <!-- 5.1 统计卡片组件 -->
  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-value" id="postsCount">0</span>
      <span class="stat-label" data-i18n="posts">Posts</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="commentsCount">0</span>
      <span class="stat-label" data-i18n="comments">Comments</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="likesCount">0</span>
      <span class="stat-label" data-i18n="likes">Likes</span>
    </div>
  </div>

  <div class="grid">
    <!-- 4.4 基于卡片的区块容器 - Profile Settings -->
    <section class="panel">
      <div class="panel-head">
        <h2 class="section-title" data-i18n="profileSettings">Profile settings</h2>
      </div>
      <div id="profileAlert" class="alert"></div>
      <form id="profileForm">
        <div class="form-grid">
          <div class="field">
            <label for="displayName" class="label" data-i18n="displayName">Display name</label>
            <input id="displayName" name="display_name" type="text" value="{{ current_user.display_name }}" class="input" required>
          </div>
          <div class="field">
            <label for="language" class="label">Language</label>
            <select id="language" name="language" class="select">
              <option value="zh" {% if current_user.language == "zh" %}selected{% endif %}>简体中文</option>
              <option value="en" {% if current_user.language == "en" %}selected{% endif %}>English</option>
            </select>
          </div>
          <div class="field">
            <label for="themePreference" class="label" data-i18n="themePreference">Theme preference</label>
            <select id="themePreference" name="theme_preference" class="select">
              <option value="system" {% if current_user.theme_preference == "system" %}selected{% endif %} data-i18n="system">System</option>
              <option value="light" {% if current_user.theme_preference == "light" %}selected{% endif %} data-i18n="light">Light</option>
              <option value="dark" {% if current_user.theme_preference == "dark" %}selected{% endif %} data-i18n="dark">Dark</option>
            </select>
          </div>
          <div class="field full">
            <label for="bio" class="label" data-i18n="bio">Bio</label>
            <textarea id="bio" name="bio" placeholder="Write a short bio" class="textarea" data-i18n-placeholder="bioPlaceholder">{{ current_user.bio or "" }}</textarea>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="saveProfileBtn" type="submit" data-i18n="saveProfile">Save profile</button>
        </div>
      </form>
    </section>

    <!-- 4.4 基于卡片的区块容器 - Password Change -->
    <section class="panel">
      <div class="panel-head">
        <h2 class="section-title" data-i18n="changePassword">Change password</h2>
      </div>
      <div id="passwordAlert" class="alert"></div>
      <form id="passwordForm">
        <div class="form-grid">
          <div class="field full">
            <label for="currentPassword" class="label" data-i18n="currentPassword">Current password</label>
            <input id="currentPassword" name="current_password" type="password" class="input" autocomplete="current-password" required>
          </div>
          <div class="field">
            <label for="newPassword" class="label" data-i18n="newPassword">New password</label>
            <input id="newPassword" name="new_password" type="password" class="input" autocomplete="new-password" required>
          </div>
          <div class="field">
            <label for="confirmPassword" class="label" data-i18n="confirmPassword">Confirm new password</label>
            <input id="confirmPassword" type="password" class="input" autocomplete="new-password" required>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="changePasswordBtn" type="submit" data-i18n="updatePassword">Update password</button>
        </div>
      </form>
    </section>

    <!-- 4.4 基于卡片的区块容器 - Comments -->
    <section class="panel">
      <div class="panel-head">
        <h2 class="section-title" data-i18n="myComments">My comments</h2>
      </div>
      <div id="commentsEmpty" class="empty" style="display:none" data-i18n="noComments">No comments yet.</div>
      <div id="commentsList" class="comment-list"></div>
    </section>
  </div>
</div>
<script src="{{ theme_assets_url('js/site-api.js') }}"></script>
<script src="{{ theme_assets_url('js/i18n.js') }}"></script>
<script>
const profileData = {{ current_user | tojson_script | safe }};
const currentLang = profileData.language || 'zh';
const commentsList = document.getElementById('commentsList');
const commentsEmpty = document.getElementById('commentsEmpty');

function showAlert(id, message, type) {
  const el = document.getElementById(id);
  el.textContent = message;
  el.className = `alert alert-${type}`;
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// 5.2 获取并显示用户统计数据
async function loadStats() {
  try {
    // TODO: 后端需要在用户对象中添加统计字段
    // 或者创建单独的 /api/v1/me/stats 端点
    const postsCount = profileData.posts_count || 0;
    const commentsCount = profileData.comments_count || 0;
    const likesCount = profileData.likes_count || 0;
    
    document.getElementById('postsCount').textContent = postsCount;
    document.getElementById('commentsCount').textContent = commentsCount;
    document.getElementById('likesCount').textContent = likesCount;
  } catch (error) {
    console.error('Failed to load stats:', error);
    // 显示占位数据
    document.getElementById('postsCount').textContent = '0';
    document.getElementById('commentsCount').textContent = '0';
    document.getElementById('likesCount').textContent = '0';
  }
}

// 10.2 获取并渲染用户评论
async function loadComments() {
  try {
    const data = await window.InkForgeApi.apiRequest('/api/me/comments?page=1&page_size=20');
    const items = data.items || [];

    if (items.length === 0) {
      commentsEmpty.style.display = 'block';
      commentsList.innerHTML = '';
      return;
    }

    commentsEmpty.style.display = 'none';
    commentsList.innerHTML = items.map((comment) => `
      <article class="comment-item">
        <div class="comment-meta">
          <a href="/${comment.post_content_type === 'page' ? 'pages' : 'posts'}/${escapeHtml(comment.post_slug)}">${escapeHtml(comment.post_title)}</a>
          <span class="comment-status">${escapeHtml(comment.status)}</span>
        </div>
        <div class="comment-meta">
          <span>${escapeHtml((comment.created_at || '').replace('T', ' ').slice(0, 16))}</span>
        </div>
        <p>${escapeHtml(comment.content)}</p>
      </article>
    `).join('');
  } catch (error) {
    // 10.2 显示错误消息
    commentsEmpty.style.display = 'block';
    commentsEmpty.textContent = window.I18n ? window.I18n.t('loadCommentsError') : 'Unable to load comments right now.';
    commentsList.innerHTML = '';
  }
}

document.getElementById('profileForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const button = document.getElementById('saveProfileBtn');
  button.disabled = true;

  try {
    await window.InkForgeApi.apiRequest('/api/v1/me/profile', {
      method: 'PATCH',
      body: {
        display_name: document.getElementById('displayName').value.trim(),
        bio: document.getElementById('bio').value.trim() || null,
        theme_preference: document.getElementById('themePreference').value,
      },
    });
    showAlert('profileAlert', window.I18n ? window.I18n.t('profileUpdated') : 'Profile updated.', 'success');
  } catch (error) {
    showAlert('profileAlert', error.message || 'Unable to update profile.', 'error');
  } finally {
    button.disabled = false;
  }
});

document.getElementById('passwordForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const button = document.getElementById('changePasswordBtn');
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (newPassword !== confirmPassword) {
    showAlert('passwordAlert', window.I18n ? window.I18n.t('passwordMismatch') : 'Password confirmation does not match.', 'error');
    return;
  }

  button.disabled = true;
  try {
    await window.InkForgeApi.apiRequest('/api/v1/me/password', {
      method: 'PATCH',
      body: {
        current_password: document.getElementById('currentPassword').value,
        new_password: newPassword,
      },
    });
    event.target.reset();
    showAlert('passwordAlert', window.I18n ? window.I18n.t('passwordUpdated') : 'Password updated.', 'success');
  } catch (error) {
    showAlert('passwordAlert', error.message || 'Unable to update password.', 'error');
  } finally {
    button.disabled = false;
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  try {
    await window.InkForgeApi.logout();
  } finally {
    window.location.href = '/login';
  }
});

// 初始化
loadStats();
loadComments();

// 9.3 初始化国际化系统
document.addEventListener('DOMContentLoaded', () => {
  if (window.I18n) {
    // 9.1 使用用户保存的语言偏好初始化
    window.I18n.init(currentLang);
    window.I18n.updatePage();
  }

  // 9.3 语言切换按钮事件 - 集成后端持久化
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const newLang = btn.dataset.lang;
      if (newLang === currentLang) return;

      // 9.3 发送PATCH请求更新语言偏好
      try {
        await window.InkForgeApi.apiRequest('/api/v1/me/profile', {
          method: 'PATCH',
          body: {
            language: newLang,
          },
        });
        // 9.3 更新成功后重新加载页面
        window.location.reload();
      } catch (error) {
        console.error('Failed to update language:', error);
        // 即使后端更新失败,也更新前端显示
        if (window.I18n) {
          window.I18n.init(newLang);
          window.I18n.updatePage();
        }
      }
    });
  });
});
</script>
</body>
</html>
