<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - {{ site_title | default("InkForge") }}</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top,#ffe5d6 0,#f8fafc 42%,#eef2ff 100%);font-family:'Manrope',sans-serif;color:#3d2f29}
.card{position:relative;width:min(100%,420px);padding:40px 34px;border-radius:28px;background:rgba(255,255,255,.75);box-shadow:0 28px 80px rgba(61,47,41,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.lang-switcher{position:absolute;top:22px;right:22px;display:flex;gap:4px;background:rgba(255,248,246,.6);padding:4px;border-radius:20px}
.lang-btn{padding:6px 12px;border:none;background:transparent;color:#6b5d56;font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;border-radius:16px;cursor:pointer;transition:all .2s}
.lang-btn.active{background:#FF6D00;color:#fff}
.lang-btn:hover:not(.active){background:rgba(255,109,0,.1)}
h1{margin:0 0 8px;font-size:30px;line-height:1.05;font-weight:700;color:#3d2f29}
p{margin:0;color:#6b5d56;font-size:15px;line-height:1.5}
.stack{display:flex;flex-direction:column;gap:16px;margin-top:28px}
label{display:flex;flex-direction:column;gap:8px;font-size:13px;font-weight:600;color:#6b5d56}
input{width:100%;padding:14px 16px;border-radius:16px;border:none;background:#fff;font:inherit;transition:box-shadow .2s;box-shadow:0 0 0 1px rgba(195,174,164,.15)}
input:focus{outline:none;box-shadow:0 0 0 2px #FF6D00,0 0 0 4px rgba(255,109,0,.12)}
button[type="submit"]{margin-top:8px;padding:14px 18px;border:0;border-radius:9999px;background:#FF6D00;color:#fff;font:inherit;font-weight:800;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 8px 24px rgba(255,109,0,.24)}
button[type="submit"]:hover{transform:translateY(-1px);box-shadow:0 12px 32px rgba(255,109,0,.28)}
button[type="submit"]:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.alert{display:none;padding:14px 16px;border-radius:16px;font-size:13px;font-weight:600;margin-top:16px}
.alert-error{background:#fff1f2;color:#dc2626;box-shadow:0 0 0 1px #fecdd3}
.footer{margin-top:22px;display:flex;justify-content:space-between;gap:12px;font-size:14px}
a{color:#FF6D00;text-decoration:none;font-weight:700;transition:color .2s}
a:hover{color:#fd6c00}
.muted{color:#6b5d56}

/* Mobile Breakpoint (< 768px) */
@media(max-width:767px){
  body{padding:22px}
  .card{padding:30px 22px;border-radius:22px}
  .lang-switcher{top:18px;right:18px}
  .footer{flex-direction:column;align-items:stretch}
  .footer a{text-align:center}
  h1{font-size:26px}
  p{font-size:14px}
}

/* Tablet Breakpoint (768px - 1024px) */
@media(min-width:768px) and (max-width:1024px){
  .card{max-width:480px;padding:36px 32px}
  h1{font-size:28px}
}

/* Desktop Breakpoint (> 1024px) */
@media(min-width:1025px){
  .card{max-width:420px;padding:40px 34px}
}
</style>
</head>
<body>
<section class="card">
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="zh">中</button>
    <button class="lang-btn" data-lang="en">En</button>
  </div>
  <h1 data-i18n="loginTitle">欢迎回来</h1>
  <p data-i18n="loginSubtitle">登录后即可评论、管理个人中心与同步会话。</p>
  <div id="errorAlert" class="alert"></div>
  <form id="loginForm" class="stack">
    <label>
      <span data-i18n="loginLabel">登录名</span>
      <input id="login" name="login" type="text" data-i18n-placeholder="loginPlaceholder" placeholder="用户名或邮箱" autocomplete="username" required>
    </label>
    <label>
      <span data-i18n="passwordLabel">密码</span>
      <input id="password" name="password" type="password" data-i18n-placeholder="passwordPlaceholder" placeholder="请输入密码" autocomplete="current-password" required>
    </label>
    <button id="submitBtn" type="submit" data-i18n="loginButton">登录</button>
  </form>
  <div class="footer">
    <a href="/register" data-i18n="createAccount">创建账号</a>
    <a class="muted" href="/" data-i18n="backToHome">返回首页</a>
  </div>
</section>
<script src="{{ theme_assets_url('js/i18n.js') }}"></script>
<script src="{{ theme_assets_url('js/site-api.js') }}"></script>
<script>
const redirectTo = {{ redirect_to | tojson_script | safe }};
const alertEl = document.getElementById('errorAlert');

// 初始化语言系统
I18n.init();

// 语言切换
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    I18n.init(btn.dataset.lang);
  });
});

// 登录表单提交
document.getElementById('loginForm').addEventListener('submit', async (event) => {
  event.preventDefault();
  const button = document.getElementById('submitBtn');
  button.disabled = true;
  alertEl.style.display = 'none';

  try {
    await window.InkForgeApi.login({
      login: document.getElementById('login').value.trim(),
      password: document.getElementById('password').value,
    });
    window.location.href = redirectTo;
  } catch (error) {
    alertEl.textContent = error.message || I18n.t('loginError', '登录失败，请稍后重试。');
    alertEl.className = 'alert alert-error';
    alertEl.style.display = 'block';
  } finally {
    button.disabled = false;
  }
});
</script>
</body>
</html>
